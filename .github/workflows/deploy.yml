# ============================================================================
# LunaFamily Homepage — Continuous Deployment
# ----------------------------------------------------------------------------
# Trigger:
#   - push to main
#   - workflow_dispatch (manuell)
#   - repository_dispatch: legal-content-updated (vom ControlPanel ausgelöst)
#
# Flow:
#   1. Astro build (static HTML)
#      Beim Build werden Rechtstexte vom ControlPanel API gefetcht und
#      statisch eingebacken (CP_API_BASE_URL + LUNAFAMILY_PROGRAM_ID).
#      Fällt die API aus: Fallback-Platzhalter, Build läuft trotzdem durch.
#   2. rsync → /var/www/lunafamily-home/ auf dem Server
# ============================================================================

name: Deploy Homepage

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [legal-content-updated]

concurrency:
  group: deploy-homepage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Astro check (TypeScript)
        run: npm run check

      - name: Build
        run: npm run build
        env:
          CP_API_BASE_URL: ${{ secrets.CP_API_BASE_URL }}
          LUNAFAMILY_PROGRAM_ID: ${{ secrets.LUNAFAMILY_PROGRAM_ID }}
        # Output → ./dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo ${{ secrets.DEPLOY_SSH_KEY }} > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -eu
          DEST=/var/www/lunafamily-home

          rsync -az --delete             -e ssh -i /home/kuba/.ssh/deploy_key -o StrictHostKeyChecking=no             ./dist/             ${DEPLOY_USER}@${DEPLOY_HOST}:${DEST}/

          echo ✅ Homepage deployed to $DEST

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
